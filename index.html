<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Mời - Đình Trọng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', 'Segoe UI', serif;
            background: linear-gradient(white 10%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Dòng chữ phía trên thiệp */
        .invitation-text {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        .invitation-text .line1 {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 18px;
            letter-spacing: 3px;
            color: #8B0000;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .invitation-text .line2 {
            font-family: 'Dancing Script', 'Georgia', cursive;
            font-size: 48px;
            color: #cc0000;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            font-weight: 400;
        }

        .invitation-text .line3 {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 16px;
            letter-spacing: 2px;
            color: #a0522d;
            margin-top: 8px;
            font-style: italic;
        }

        /* Vỏ thiệp là ảnh - KHÔNG BÓNG ĐEN */
        .invitation-envelope {
            width: 500px;
            max-width: 90%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .invitation-envelope img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            display: block;
            transition: transform 0.3s ease;
        }

        /* Hiệu ứng rung */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Hiệu ứng phóng to */
        @keyframes scaleUp {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Hiệu ứng mở ra (chuyển trang) */
        @keyframes openEffect {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.8;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* Hiệu ứng chữ xuất hiện */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .invitation-envelope.shake img {
            animation: shake 0.3s ease-in-out 0s 2;
        }

        .invitation-envelope.scale img {
            animation: scaleUp 0.2s ease-in-out;
        }

        .invitation-envelope.open img {
            animation: openEffect 0.4s ease-out forwards;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #bbb;
            font-size: 12px;
            font-family: 'Georgia', serif;
        }
    </style>
    <!-- Google Fonts cho chữ đẹp -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Dòng chữ phía trên thiệp -->
        <div class="invitation-text">
            <div class="line1">✨ You're Invited ✨</div>
            <div class="line2">Trọng invites you to</div>
            <div class="line3">Graduation Ceremony</div>
        </div>

        <!-- Vỏ thiệp -->
        <div class="invitation-envelope" id="envelope">
            <img id="envelopeImage" src="https://via.placeholder.com/500x600?text=Normal+Image" alt="Thiệp mời">
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Đình Trọng - Graduation Invitation</p>
    </div>

    <script>
        // 📌 CẤU HÌNH URL ẢNH
        // Ảnh bình thường (lúc chưa chạm)
        const normalImage = 'https://i.pinimg.com/1200x/fd/0d/69/fd0d69112d57fd4dc384c96ec6feeb95.jpg';
        
        // Ảnh khi di chuột vào (hover) VÀ khi click
        const hoverImage = 'https://i.pinimg.com/736x/43/66/1d/43661d8e7076063bcb6e014d64270ca7.jpg';
        
        // Gán ảnh ban đầu
        const imgElement = document.getElementById('envelopeImage');
        imgElement.src = normalImage;

        const envelope = document.getElementById('envelope');
        let isAnimating = false;
        let hasBeenClicked = false;

        // HIỆU ỨNG HOVER: đổi ảnh khi chạm vào
        envelope.addEventListener('mouseenter', function() {
            if (!hasBeenClicked) {
                imgElement.src = hoverImage;
            }
        });

        envelope.addEventListener('mouseleave', function() {
            if (!hasBeenClicked) {
                imgElement.src = normalImage;
            }
        });

        // Hiệu ứng rung + phóng to
        function addShakeAndScale() {
            if (isAnimating) return;
            
            envelope.classList.add('shake');
            
            setTimeout(() => {
                envelope.classList.remove('shake');
                envelope.classList.add('scale');
                
                setTimeout(() => {
                    envelope.classList.remove('scale');
                }, 200);
            }, 300);
        }

        // Chuyển trang
        function redirectToMainPage() {
            if (isAnimating) return;
            isAnimating = true;
            
            envelope.classList.add('open');
            
            setTimeout(() => {
                window.location.href = 'KyyeucungTrong.html';
            }, 400);
        }

        // Xử lý click
        envelope.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Đổi thành ảnh hover (nếu chưa đổi)
            if (!hasBeenClicked) {
                imgElement.src = hoverImage;
                hasBeenClicked = true;
            }
            
            // Chạy hiệu ứng
            addShakeAndScale();
            
            setTimeout(() => {
                redirectToMainPage();
            }, 600);
        });
    </script>
</body>
</html>
