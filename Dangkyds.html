<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Kỷ Yếu Cùng Trọng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #440808 20%, #a53636 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Dòng chạy phía trên cùng */
        .marquee-top {
            width: 100%;
            background: linear-gradient(90deg, #8B0000, #cc0000, #8B0000);
            color: #ffd700;
            padding: 10px 0;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .marquee-top marquee {
            color: #ffd700;
        }

        .container {
            max-width: 700px;
            margin: 80px auto 40px;
            padding: 40px 20px;
        }

        /* Progress Bar */
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin: 20px 0 40px;
        }

        .progress {
            background: linear-gradient(90deg, #ff4444, #ff8888);
            width: 66%;
            height: 100%;
            border-radius: 10px;
        }

        /* Form Card */
        .form-card {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,68,68,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .form-card h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff4444, #ff8888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ff8888;
        }

        input, select {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,68,68,0.3);
            border-radius: 15px;
            font-size: 16px;
            color: white;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff4444;
            background: rgba(255,68,68,0.1);
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        /* Radio Group */
        .radio-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ff4444;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            font-family: inherit;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,68,68,0.4);
        }

        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #ff8888;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        /* Footer bản quyền */
        .footer {
            text-align: center;
            padding: 15px;
            color: #ffcccc;
            font-size: 11px;
            font-family: 'Segoe UI', serif;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .form-card { padding: 30px 20px; }
            .form-card h1 { font-size: 28px; }
            .btn-submit { font-size: 18px; }
            .container { margin-top: 70px; }
        }
    </style>
</head>
<body>
    <!-- Dòng chạy phía trên cùng -->
    <div class="marquee-top">
        <marquee behavior="scroll" direction="left" scrollamount="4">
            💌 Ai muốn tạo web lời mời kỷ yếu ib Trọng nhé - 50k/người 💌
        </marquee>
    </div>

    <div class="container">
        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <div class="form-card">
            <h1>📝 Đăng Ký Tham Gia</h1>
            <div class="subtitle">Vui lòng điền đầy đủ thông tin bên dưới</div>

            <!-- Thông báo thành công -->
            <div id="successMessage" style="display: none; background: rgba(0,255,0,0.15); border: 1px solid #00ff00; border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: center; color: #00ff88;">
                ✅ Đăng ký thành công! Cảm ơn bạn đã tham gia ❤️
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label>👤 Họ và tên, biệt danh cũng được</label>
                    <input type="text" id="fullname" placeholder="Ví dụ: Đoàn Đình Trọng" required>
                </div>

                <div class="form-group">
                    <label>😭 Bạn đi cùng ai, và có ai lớp tôi quen bạn không?</label>
                    <input type="text" id="accompany" placeholder="Tui đi với VLGB, tui không quen ai cạ😥" required>
                </div>

                <div class="form-group">
                    <label>🏫 Trường</label>
                    <input type="text" id="school" placeholder="Ví dụ: số 1 Bắc Lý" required>
                </div>

                <div class="form-group">
                    <label>👕 Giới tính</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="gender" value="Nam"> Nam
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="gender" value="Nữ"> Nữ
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>🍕 Bạn muốn chụp với chủ đề?</label>
                    <select id="topic">
                        <option value="Chỉ chụp với Trọng">Chỉ chụp với Trọng</option>
                        <option value="Anh em xã đoàn">Anh em xã đoàn</option>
                        <option value="Bạn bè của bạn và Trọng">Bạn bè của bạn và Trọng</option>
                        <option value="Những vĩ nhân thế kỉ 22">Những vĩ nhân thế kỉ 22</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">🎉 HOÀN THÀNH ĐĂNG KÝ 🎉</button>
            </form>

            <div class="back-link">
                <a href="KyyeucungTrong.html">← Quay lại trang giới thiệu</a>
            </div>
        </div>
    </div>

    <!-- Footer bản quyền -->
    <div class="footer">
        <p>© 2026 Đình Trọng - Bản quyền thuộc về Trọng. Mọi hành vi sao chép đều bị nghiêm cấm.</p>
    </div>

    <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // Lấy giá trị gender từ radio
        let gender = '';
        const radios = document.getElementsByName('gender');
        for(let i = 0; i < radios.length; i++) {
            if(radios[i].checked) {
                gender = radios[i].value;
                break;
            }
        }

        // Tạo object lưu thông tin
        const userData = {
            fullname: document.getElementById('fullname').value,
            accompany: document.getElementById('accompany').value,
            school: document.getElementById('school').value,
            gender: gender,
            topic: document.getElementById('topic').value,
            registerDate: new Date().toLocaleString('vi-VN')
        };

        // 📌 URL GOOGLE SHEETS
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywl1QPkwdOp6n2_jkR8Ohoe7AdgKxf9Pk4qTgZrLeXCtdjmofgJcLdlNv1arcqh1mPhQ/exec';

        try {
            // Gửi lên Google Sheets
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            // Lưu vào localStorage (dự phòng)
            let allRegistrations = JSON.parse(localStorage.getItem('kyyeu_registrations') || '[]');
            allRegistrations.push(userData);
            localStorage.setItem('kyyeu_registrations', JSON.stringify(allRegistrations));
            localStorage.setItem('last_registration', JSON.stringify(userData));

            // Hiển thị thông báo thành công
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            
            // Reset form
            document.getElementById('registerForm').reset();
            const radiosReset = document.getElementsByName('gender');
            radiosReset.forEach(radio => radio.checked = false);
            
            // Chuyển sang trang cảm ơn sau 1.5 giây
            setTimeout(function() {
                window.location.href = 'camonaenhe.html';
            }, 1500);
            
        } catch (error) {
            console.error('Lỗi:', error);
            alert('Có lỗi xảy ra: ' + error.message);
        }
    });
    </script>
</body>
</html>
