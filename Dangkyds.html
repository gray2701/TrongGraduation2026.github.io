<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Kỷ Yếu Cùng Trọng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #440808 20%, #a53636 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Progress Bar */
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin: 20px 0 40px;
        }

        .progress {
            background: linear-gradient(90deg, #ff4444, #ff8888);
            width: 66%;
            height: 100%;
            border-radius: 10px;
        }

        /* Form Card */
        .form-card {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,68,68,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .form-card h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff4444, #ff8888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ff8888;
        }

        input, select {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,68,68,0.3);
            border-radius: 15px;
            font-size: 16px;
            color: white;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff4444;
            background: rgba(255,68,68,0.1);
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        /* Radio Group */
        .radio-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ff4444;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            font-family: inherit;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,68,68,0.4);
        }

        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #ff8888;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .form-card { padding: 30px 20px; }
            .form-card h1 { font-size: 28px; }
            .btn-submit { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <div class="form-card">
            <h1>📝 Đăng Ký Tham Gia</h1>
            <div class="subtitle">Vui lòng điền đầy đủ thông tin bên dưới</div>

            <form id="registerForm">
                <div class="form-group">
                    <label>👤 Họ và tên,biệt danh cũng được</label>
                    <input type="text" id="fullname" placeholder="Ví dụ: Đoàn Đình Trọng" required>
                </div>

                <div class="form-group">
                    <label>😭 Bạn đi cùng ai, và có ai lớp tôi quen bạn không?</label>
                    <input type="text" id="accompany" placeholder="Tui đi với VLGB, tui không quen ai cạ😥" required>
                </div>

                <div class="form-group">
                    <label>🏫 Trường</label>
                    <input type="text" id="school" placeholder="Ví dụ: số 1 Bắc Lý" required>
                </div>

                <div class="form-group">
                    <label>👕 Giới tính</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="gender" value="Nam"> Nam
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="gender" value="Nữ"> Nữ
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>🍕 Bạn muốn chụp với chủ đề?</label>
                    <select id="topic">
                        <option value="Chỉ chụp với Trọng">Chỉ chụp với Trọng</option>
                        <option value="Anh em xã đoàn">Anh em xã đoàn</option>
                        <option value="Bạn bè của bạn và Trọng">Bạn bè của bạn và Trọng</option>
                        <option value="Những vĩ nhân thế kỉ 22">Những vĩ nhân thế kỉ 22</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" onclick="window.location.href='Camonaenhe.html';">🎉 HOÀN THÀNH ĐĂNG KÝ 🎉</button>
<a href="Camonaenhe.html" class="btn-submit-link" style="display: none;">🎉 HOÀN THÀNH ĐĂNG KÝ 🎉</a>
            </form>

            <div class="back-link">
                <a href="KyyeucungTrong.html">← Quay lại trang giới thiệu</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Lấy giá trị gender từ radio
            let gender = '';
            const radios = document.getElementsByName('gender');
            for(let i = 0; i < radios.length; i++) {
                if(radios[i].checked) {
                    gender = radios[i].value;
                    break;
                }
            }

            // Tạo object lưu thông tin
            const userData = {
                fullname: document.getElementById('fullname').value,
                accompany: document.getElementById('accompany').value,
                school: document.getElementById('school').value,
                gender: gender,
                topic: document.getElementById('topic').value,
                registerDate: new Date().toLocaleString('vi-VN')
            };

            // Lưu vào localStorage để giả lập CSDL
            let allRegistrations = JSON.parse(localStorage.getItem('kyyeu_registrations') || '[]');
            allRegistrations.push(userData);
            localStorage.setItem('kyyeu_registrations', JSON.stringify(allRegistrations));

            // Lưu thông tin người vừa đăng ký để hiển thị trên trang cảm ơn
            localStorage.setItem('last_registration', JSON.stringify(userData));

            // Chuyển sang trang cảm ơn
            window.location.href = 'thankyou.html';
        });
    </script>
</body>
</html>
